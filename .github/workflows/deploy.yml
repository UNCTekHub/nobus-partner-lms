name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            # Fix ownership so ubuntu user can write
            sudo chown -R ubuntu:ubuntu /opt/nobus-lms

            # Mark repo as safe for git
            git config --global --add safe.directory /opt/nobus-lms

            cd /opt/nobus-lms
            git pull origin main
            cd server && npm install --omit=dev
            cd .. && npm install && npm run build
            pm2 restart nobus-lms || pm2 start server/index.js --name nobus-lms

            # Configure Nginx reverse proxy
            sudo tee /etc/nginx/sites-available/nobus-lms > /dev/null << 'NGINXCONF'
            server {
                listen 80;
                server_name _;

                location / {
                    proxy_pass http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINXCONF
            sudo ln -sf /etc/nginx/sites-available/nobus-lms /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx
