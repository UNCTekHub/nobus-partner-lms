name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            sudo chown -R ubuntu:ubuntu /opt/nobus-lms
            git config --global --add safe.directory /opt/nobus-lms
            cd /opt/nobus-lms
            git pull origin main
            echo 'VITE_API_URL=/api' > .env
            if [ ! -f server/.env ]; then
              echo "PORT=3001" > server/.env
              echo "JWT_SECRET=$(openssl rand -hex 32)" >> server/.env
              echo "DB_PATH=./data/lms.db" >> server/.env
            fi
            echo "=== Installing server dependencies ==="
            cd server && npm install
            echo "=== Resetting database for new admin setup ==="
            rm -f data/lms.db
            echo "=== Seeding database ==="
            node seed.js
            echo "=== Installing frontend dependencies ==="
            cd .. && npm install
            echo "=== Building frontend ==="
            npm run build
            echo "=== Build complete ==="
            ls -la dist/ | head -10
            echo "=== Restarting PM2 ==="
            pm2 delete nobus-lms || true
            sudo fuser -k 3001/tcp || true
            sleep 1
            cd /opt/nobus-lms
            pm2 start server/index.js --name nobus-lms
            sleep 3
            echo "=== PM2 Status ==="
            pm2 status
            echo "=== PM2 Logs ==="
            pm2 logs nobus-lms --lines 20 --nostream
            echo "=== Health Check ==="
            curl -s http://localhost:3001/api/health || echo "HEALTH CHECK FAILED"
            echo ""
            echo "=== Test Login ==="
            curl -s -X POST http://localhost:3001/api/auth/login -H "Content-Type: application/json" -d '{"email":"admin@nobus.io","password":"admin123"}' || echo "LOGIN TEST FAILED"
            echo ""

      - name: Configure Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo 'server { listen 80; server_name _; location / { proxy_pass http://127.0.0.1:3001; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_cache_bypass $http_upgrade; } }' | sudo tee /etc/nginx/sites-available/nobus-lms > /dev/null
            sudo ln -sf /etc/nginx/sites-available/nobus-lms /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx
            echo "=== Nginx configured ==="
